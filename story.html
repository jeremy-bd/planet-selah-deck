<!DOCTYPE html>
<html class="staticrypt-html" lang="ko">
    <head>
        <meta charset="utf-8" />
        <title>Planet Selah</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

        <style>
            :root{
                --canvas-deep:#0c0a09; --on-dark:#ffffff; --on-dark-soft:#a8a29e;
                --peach:#f4c5a8; --rose:#e8b8c4; --lavender:#c8b8e0; --sky:#a8c8e8;
                --serif:'EB Garamond',Georgia,'Nanum Myeongjo',serif;
                --sans:'Inter','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
            }
            *{margin:0;padding:0;box-sizing:border-box;}
            :where(span,p,div){word-break:keep-all;}
            .staticrypt-html{height:100%;}
            .staticrypt-body{height:100%;margin:0;background:var(--canvas-deep);color:var(--on-dark);
                font-family:var(--sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow:hidden;}

            /* 파스텔 오브 (장식) */
            .lk-orb{position:absolute;border-radius:50%;filter:blur(72px);opacity:.32;z-index:1;
                pointer-events:none;animation:lk-breathe 6s ease-in-out infinite;}
            .lk-orb.peach{background:radial-gradient(circle,var(--peach),transparent 70%);}
            .lk-orb.rose{background:radial-gradient(circle,var(--rose),transparent 70%);}
            .lk-orb.lav{background:radial-gradient(circle,var(--lavender),transparent 70%);}
            .lk-orb.sky{background:radial-gradient(circle,var(--sky),transparent 70%);}
            @keyframes lk-breathe{0%,100%{transform:scale(1);opacity:.28}50%{transform:scale(1.12);opacity:.4}}
            .lk-stars{position:absolute;inset:0;z-index:1;pointer-events:none;}
            .lk-star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.5;
                animation:lk-tw 4s ease-in-out infinite;}
            @keyframes lk-tw{0%,100%{opacity:.22}50%{opacity:.9}}

            /* 로딩 스피너 */
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;}
            .staticrypt-spinner{display:inline-block;width:2rem;height:2rem;border:.22em solid rgba(255,255,255,.25);
                border-right-color:transparent;border-radius:50%;animation:lk-spin .75s linear infinite;}
            @keyframes lk-spin{100%{transform:rotate(360deg);}}

            /* 입장 콘텐츠 */
            .staticrypt-content{height:100%;}
            .lk-wrap{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;
                align-items:center;justify-content:center;text-align:center;padding:8vh 24px;}
            .lk-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);
                border-radius:9999px;padding:7px 16px;font-weight:600;font-size:11px;letter-spacing:.16em;
                text-transform:uppercase;color:var(--on-dark-soft);}
            .lk-title{font-family:var(--serif);font-weight:400;line-height:1.14;letter-spacing:-.01em;
                font-size:clamp(34px,5vw,60px);margin-top:26px;}
            .lk-sub{font-size:clamp(14px,1.2vw,17px);line-height:1.62;color:var(--on-dark-soft);
                margin-top:18px;max-width:460px;}
            .lk-form{margin-top:34px;width:min(380px,90vw);}
            .lk-field{position:relative;}
            #staticrypt-password{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
                border-radius:9999px;color:#fff;font-family:var(--sans);font-size:16px;padding:16px 50px 16px 22px;
                outline:0;transition:border-color .2s,background .2s;}
            #staticrypt-password::placeholder{color:rgba(255,255,255,.4);}
            #staticrypt-password:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.1);}
            .staticrypt-toggle-password-visibility{cursor:pointer;height:18px;width:18px;opacity:.5;
                position:absolute;right:18px;top:50%;transform:translateY(-50%);filter:invert(1);}
            .staticrypt-decrypt-button{margin-top:14px;width:100%;background:#fff;color:#0c0a09;border:0;
                border-radius:9999px;padding:16px;font-family:var(--sans);font-size:16px;font-weight:600;
                cursor:pointer;transition:transform .15s ease,box-shadow .2s;box-shadow:0 12px 40px rgba(0,0,0,.42);}
            .staticrypt-decrypt-button:hover{transform:translateY(-2px);box-shadow:0 18px 56px rgba(0,0,0,.5);}
            .staticrypt-decrypt-button:active{transform:translateY(0);}
            label.staticrypt-remember{display:flex;align-items:center;justify-content:center;gap:8px;
                margin-top:14px;color:var(--on-dark-soft);font-size:13px;}
            .staticrypt-remember input[type="checkbox"]{transform:scale(1.3);margin-right:6px;}
            .lk-foot{margin-top:30px;font-size:11.5px;letter-spacing:.05em;color:rgba(255,255,255,.4);}
            .hidden{display:none !important;}
            @media screen and (-webkit-min-device-pixel-ratio:0){ #staticrypt-password{font-size:16px;} }
        </style>
    </head>
